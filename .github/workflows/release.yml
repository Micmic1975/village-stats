name: Release Mod

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build

      - name: Publish to Modrinth, CurseForge and GitHub
        uses: Kir-Antipov/mc-publish@v3
        with:
          modrinth-id: jIFiaesM
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          curseforge-id: 1514277
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-tag: ${{ github.ref_name }}

          files: |
            build/libs/*.jar
            !build/libs/*-sources.jar

          name: Village Stats ${{ github.ref_name }}
          version: ${{ github.ref_name }}
          version-type: release

          changelog: |
            Village Stats ${{ github.ref_name }}

            Changes:
            - Added broader animal tracking around the village
            - Animals with zero count are no longer shown
            - Separated animals into pets and other animals in the stats window
            - Improved village animal statistics display

          loaders: |
            fabric

          game-versions: |
            26.1.2